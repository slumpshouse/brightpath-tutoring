name: BrightPath CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/*"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # CI-only, non-sensitive defaults (real production values come from GitHub Secrets in the deploy job).
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_password
      POSTGRES_DB: ci_db
      DATABASE_URL: postgresql://ci_user:ci_password@db:5432/ci_db
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run tests (lint + typecheck)
        run: pnpm test

      - name: Build app
        run: pnpm build

      - name: Generate runtime env file for Compose
        run: |
          cat > .env.production <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DATABASE_URL=${DATABASE_URL}
          NODE_ENV=${NODE_ENV}
          EOF

      - name: Build images
        run: docker compose build

      - name: Start database
        run: docker compose up -d db

      - name: Wait for healthy database
        run: |
          set -e
          db_id=$(docker compose ps -q db)

          for i in {1..30}; do
            db_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$db_id")
            echo "Attempt $i: db=$db_status"
            if [ "$db_status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done

          echo 'Services did not become healthy in time'
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Run database migrations
        run: docker compose run --rm app prisma migrate deploy --schema=prisma/schema.prisma

      - name: Start app
        run: docker compose up -d app

      - name: Wait for healthy app
        run: |
          set -e
          app_id=$(docker compose ps -q app)

          for i in {1..30}; do
            app_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$app_id")
            echo "Attempt $i: app=$app_status"
            if [ "$app_status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done

          echo 'App did not become healthy in time'
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Smoke test (HTTP)
        run: curl -fsS http://localhost:3000 > /dev/null

      - name: Compose status
        if: always()
        run: docker compose ps

      - name: Compose logs
        if: always()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy (EC2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"

            # Create/update the production env file on the server (not committed to git).
            cat > .env.production <<'EOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            EOF

            set -a
            . ./.env.production
            set +a

            git fetch --all
            git reset --hard origin/main

            docker compose build
            docker compose up -d db

            for i in {1..30}; do
              if docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
                break
              fi
              sleep 2
            done

            docker compose run --rm app prisma migrate deploy --schema=prisma/schema.prisma
            docker compose up -d app