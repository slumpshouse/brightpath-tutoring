# .github/workflows/ci.yml
name: BrightPath CI/CD Pipeline



on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'feature/*'

jobs:
  code-quality-checks:
    name: Code Quality & Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure pnpm Package Manager
        uses: pnpm/action-setup@v4

      - name: Configure Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Project Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma ORM Client
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm exec prisma generate

      - name: Run ESLint Static Analysis
        run: pnpm lint

      - name: Run TypeScript Compiler Checks
        run: pnpm exec tsc --noEmit

      - name: Build Production Application
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm build

  container-integration-test:
    name: Container Orchestration & Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality-checks

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Generate CI Environment Configuration
        run: |
          cat > .env.production <<'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=brightpath
          DATABASE_URL=postgresql://postgres:postgres@db:5432/brightpath
          DIRECT_URL=postgresql://postgres:postgres@db:5432/brightpath
          NODE_ENV=production
          EOF

      - name: Build and Launch Service Stack
        run: docker compose up -d --build

      - name: Await Service Health Readiness
        run: |
          set -e
          db_id=$(docker compose ps -q db)
          app_id=$(docker compose ps -q app)

          for i in {1..30}; do
            db_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$db_id")
            app_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$app_id")
            echo "Attempt $i: db=$db_status app=$app_status"
            if [ "$db_status" = "healthy" ] && [ "$app_status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done
          echo 'Services did not become healthy in time'
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Validate Application HTTP Response
        run: curl -fsS http://localhost:3000 > /dev/null

      - name: Execute Database Schema Migrations
        run: |
          echo "=== Running Prisma migrations ==="
          docker compose exec -T app prisma migrate deploy --schema=prisma/schema.prisma
          echo "OK: Migrations applied successfully"

      - name: Validate Migration Integrity
        run: |
          echo "=== Checking migration status ==="
          docker compose exec -T db psql -U brightpath -d brightpath_db -c "SELECT migration_name, finished_at FROM _prisma_migrations ORDER BY finished_at;"

          # Verify no failed migrations
          FAILED=$(docker compose exec -T db psql -U brightpath -d brightpath_db -t -c "SELECT COUNT(*) FROM _prisma_migrations WHERE rolled_back_at IS NOT NULL OR migration_name IS NULL;")
          if [ "$FAILED" -gt 0 ]; then
            echo " Found failed migrations"
            exit 1
          fi
          echo "OK: All migrations applied successfully"

      - name: Validate Database Table Provisioning
        run: |
          echo "=== All tables in database ==="
          docker compose exec -T db psql -U brightpath -d brightpath_db -c "\dt"

          # Count tables (excluding Prisma internal tables)
          TABLE_COUNT=$(docker compose exec -T db psql -U brightpath -d brightpath_db -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name != '_prisma_migrations';")
          echo "OK: Found $TABLE_COUNT application table(s)"

          if [ "$TABLE_COUNT" -lt 1 ]; then
            echo " No application tables found"
            exit 1
          fi

      - name: Inspect Database Schema Structure
        run: |
          echo "=== Schema for all tables ==="
          docker compose exec -T db psql -U brightpath -d brightpath_db -c "
            SELECT table_name, column_name, data_type, is_nullable
            FROM information_schema.columns
            WHERE table_schema = 'public' AND table_name != '_prisma_migrations'
            ORDER BY table_name, ordinal_position;
          "

      - name: Verify Database Read/Write Operations
        run: |
          echo "=== Testing database read/write ==="
          # Get all table names
          TABLES=$(docker compose exec -T db psql -U brightpath -d brightpath_db -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' AND table_name != '_prisma_migrations';")

          for table in $TABLES; do
            echo "Testing table: $table"
            docker compose exec -T db psql -U brightpath -d brightpath_db -c "SELECT COUNT(*) as row_count FROM \"$table\";"
          done
          echo "OK: Database operations successful"

      - name: Report Service Status
        if: always()
        run: docker compose ps

      - name: Collect Service Logs
        if: always()
        run: docker compose logs --no-color

      - name: Teardown and Clean Environment
        if: always()
        run: docker compose down -v

  production-database-migration:
    name: Neon Production Database Migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: code-quality-checks

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure pnpm Package Manager
        uses: pnpm/action-setup@v4

      - name: Configure Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Project Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Prisma Migrations to Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec prisma migrate deploy