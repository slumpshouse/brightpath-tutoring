# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build and Test
  # Runs on every push.
  # Build containers, start services, run migrations,
  # run linter, tear everything down.
  # If this fails — deployment never happens.
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Lint step (fast feedback before Docker build) ──
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: pnpm run lint

      # ── Docker-based build, migrate, and verify ──
      - name: Create .env.production for CI
        run: |
          echo "DATABASE_URL=postgres://brightpath:brightpath_pw@db:5432/brightpath_db" > .env.production

      - name: Build Containers
        run: docker compose build

      - name: Start Services
        run: docker compose up -d

      - name: Wait for DB Healthy
        run: |
          echo "Waiting for database to become healthy..."
          timeout=60
          elapsed=0
          until docker compose exec db pg_isready -U brightpath -d brightpath_db > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "DB health check timed out after ${timeout}s"
              docker compose logs db
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Database is healthy."

      - name: Wait for App Healthy
        run: |
          echo "Waiting for app to become healthy..."
          timeout=90
          elapsed=0
          until docker compose exec app wget -qO- http://127.0.0.1:3000/ > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "App health check timed out after ${timeout}s"
              docker compose logs app
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
          done
          echo "App is healthy."

      - name: Run Prisma Migrations
        run: docker compose exec app npx prisma migrate deploy

      - name: Verify Services are Healthy
        run: docker compose ps

      - name: Tear Down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────
  # Job 2: Deploy
  # Runs ONLY on push to main.
  # Blocked by build-and-test — no green tests, no deploy.
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "✅ All tests passed. Deploying to production..."
          echo "Add your deployment steps here (SSH to EC2, pull, rebuild, migrate)."
