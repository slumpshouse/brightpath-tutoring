# .github/workflows/ci.yml
name: CI/CD Pipeline



on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/*"

jobs:
  app-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm build

  compose-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: app-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env.production <<'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=brightpath
          DATABASE_URL=postgresql://postgres:postgres@db:5432/brightpath
          DIRECT_URL=postgresql://postgres:postgres@db:5432/brightpath
          NODE_ENV=production
          EOF

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          set -e
          db_id=$(docker compose ps -q db)
          app_id=$(docker compose ps -q app)

          for i in {1..30}; do
            db_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$db_id")
            app_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$app_id")
            echo "Attempt $i: db=$db_status app=$app_status"
            if [ "$db_status" = "healthy" ] && [ "$app_status" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done
          echo 'Services did not become healthy in time'
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Verify app responds
        run: curl -fsS http://localhost:3000 > /dev/null

      - name: Run database migrations
        run: |
          echo "=== Running Prisma migrations ==="
          docker compose exec -T app prisma migrate deploy --schema=prisma/schema.prisma
          echo "OK: Migrations applied successfully"

      - name: Verify all migrations applied
        run: |
          echo "=== Checking migration status ==="
          docker compose exec -T db psql -U postgres -d brightpath -c "SELECT migration_name, finished_at FROM _prisma_migrations ORDER BY finished_at;"

          # Verify no failed migrations
          FAILED=$(docker compose exec -T db psql -U postgres -d brightpath -t -c "SELECT COUNT(*) FROM _prisma_migrations WHERE rolled_back_at IS NOT NULL OR migration_name IS NULL;")
          if [ "$FAILED" -gt 0 ]; then
            echo " Found failed migrations"
            exit 1
          fi
          echo "OK: All migrations applied successfully"

      - name: Verify all database tables exist
        run: |
          echo "=== All tables in database ==="
          docker compose exec -T db psql -U postgres -d brightpath -c "\dt"

          # Count tables (excluding Prisma internal tables)
          TABLE_COUNT=$(docker compose exec -T db psql -U postgres -d brightpath -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name != '_prisma_migrations';")
          echo "OK: Found $TABLE_COUNT application table(s)"

          if [ "$TABLE_COUNT" -lt 1 ]; then
            echo " No application tables found"
            exit 1
          fi

      - name: Verify database schema for all tables
        run: |
          echo "=== Schema for all tables ==="
          docker compose exec -T db psql -U postgres -d brightpath -c "
            SELECT table_name, column_name, data_type, is_nullable
            FROM information_schema.columns
            WHERE table_schema = 'public' AND table_name != '_prisma_migrations'
            ORDER BY table_name, ordinal_position;
          "

      - name: Test database operations
        run: |
          echo "=== Testing database read/write ==="
          # Get all table names
          TABLES=$(docker compose exec -T db psql -U postgres -d brightpath -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' AND table_name != '_prisma_migrations';")

          for table in $TABLES; do
            echo "Testing table: $table"
            docker compose exec -T db psql -U postgres -d brightpath -c "SELECT COUNT(*) as row_count FROM \"$table\";"
          done
          echo "OK: Database operations successful"

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Show compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  neon-prisma-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: app-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Neon secrets
        id: neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          NEON_DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: |
          if [ -n "$NEON_DATABASE_URL" ] && [ -n "$NEON_DIRECT_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Neon secrets are not set. Skipping migrate deploy job steps."
          fi

      - name: Setup pnpm
        if: steps.neon.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        if: steps.neon.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.neon.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrate deploy (Neon)
        if: steps.neon.outputs.enabled == 'true'
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm exec prisma migrate deploy