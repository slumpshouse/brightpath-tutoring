services:
  app:
    build: ./
    ports:
      - "3000:3000"
    env_file:
    - .env.production
    environment:
      DATABASE_URL: postgres://brightpath:brightpath_pw@db:5432/brightpath_db
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: brightpath
      POSTGRES_PASSWORD: brightpath_pw
      POSTGRES_DB: brightpath_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brightpath -d brightpath_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
   